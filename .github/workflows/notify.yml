      #       -H 'Content-Type: application/json' \
      #       -d @- <<EOF
      #     {
      #       "text": "✦ *${{ steps.details.outputs.title }}* by ${{ steps.details.outputs.author }}\n${{ steps.details.outputs.url }}"
      #     }
      #     EOF

      # ── Option B: Discord ───────────────────────────────────────────────────
      # Add secret DISCORD_WEBHOOK_URL, then uncomment.
      # - name: Notify Discord
      #   env:
      #     DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
      #   run: |
      #     curl -fsS -X POST "$DISCORD_WEBHOOK" \
      #       -H 'Content-Type: application/json' \
      #       -d @- <<EOF
      #     {
      #       "embeds": [{
      #         "title": "✦ ${{ steps.details.outputs.title }}",
      #         "description": "by **${{ steps.details.outputs.author }}** — ${{ steps.details.outputs.tags }}",
      #         "url": "${{ steps.details.outputs.url }}",
